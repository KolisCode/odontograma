<div class="login-wrapper d-flex flex-column min-vh-100">
  <div class="login d-flex justify-content-center align-items-center flex-grow-1 py-4">
    <div class="card login-card shadow-sm border-0">
      <div class="card-body p-4 p-md-5">

        <div class="text-center mb-4">
          <img src="logos/muelaBiodont.png" alt="Logo de Biodont" class="logo mb-3">
          <h1 class="fw-bold mb-1" id="titulo">BIODONT</h1>
          <p class="text-muted mb-0">Accede al sistema odontológico</p>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
          <div class="mb-3">
            <label for="inputEmail" class="form-label fw-semibold">Usuario</label>
            <div class="input-group">
              <span class="input-group-text">
                <i class="bi bi-person"></i>
              </span>
              <input
                type="email"
                class="form-control"
                id="inputEmail"
                placeholder="correo@ejemplo.com"
                autocomplete="username"
                formControlName="correo"
              >
            </div>

            <small
              *ngIf="loginForm.get('correo')?.touched && loginForm.get('correo')?.invalid"
              class="field-error">
              Ingresa un correo válido.
            </small>
          </div>

          <div class="mb-2">
            <div class="d-flex justify-content-between align-items-center">
              <label for="inputPassword" class="form-label fw-semibold mb-0">Contraseña</label>
              <a class="small text-decoration-none enlace" href="javascript:void(0)">
                Recuperar contraseña
              </a>
            </div>

            <div class="input-group mt-2">
              <span class="input-group-text">
                <i class="bi bi-lock"></i>
              </span>
              <input
                [type]="showPassword ? 'text' : 'password'"
                class="form-control"
                id="inputPassword"
                placeholder="Ingresa tu contraseña"
                autocomplete="current-password"
                formControlName="password"
              >
              <button
                type="button"
                class="input-group-text btn-show-password"
                (click)="showPassword = !showPassword"
                [attr.aria-label]="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'">
                <i class="bi" [class.bi-eye]="!showPassword" [class.bi-eye-slash]="showPassword"></i>
              </button>
            </div>

            <small
              *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
              class="field-error">
              La contraseña es obligatoria.
            </small>
          </div>

          <div *ngIf="errorMessage" class="alert alert-danger py-2 px-3 mt-3 mb-3" role="alert">
            {{ errorMessage }}
          </div>

          <div class="d-grid mt-4">
            <button
              id="botonInicio"
              type="submit"
              class="btn btn-primary btn-lg"
              [disabled]="loading">
              {{ loading ? 'Ingresando...' : 'Iniciar sesión' }}
            </button>
          </div>

          <div class="text-center mt-4 enlaces" id="registro">
            <span class="text-muted">¿No tienes cuenta?</span>
            <a class="enlace ms-1 fw-semibold text-decoration-none" routerLink="/register">
              Registrar usuario
            </a>
          </div>
        </form>

      </div>
    </div>
  </div>

  <app-footer></app-footer>
</div>
