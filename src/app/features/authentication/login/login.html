

<div class="login-wrapper d-flex flex-column min-vh-100">
  <div class="login d-flex justify-content-center align-items-center flex-grow-1">
    <div class="card login-card">

      <div class="card-body">

        <div class="text-center mb-4">
          <img src="logos/muelaBiodont.png" alt="Biodont" class="logo mb-2">
          <h4 class="fw-bold" id="titulo">BIODONT</h4>
          <p class="text-muted">Acceso al sistema</p>
        </div>

        <form>

          <div class="mb-3">
            <label for="inputEmail" class="form-label">Usuario</label>
            <input
              type="email"
              class="form-control"
              id="inputEmail"
              placeholder="correo@ejemplo.com"
            >
          </div>

          <div class="mb-3">
            <label for="inputPassword" class="form-label">Contraseña</label>
            <input
              type="password"
              class="form-control"
              id="inputPassword"
              placeholder="************"
            >
          </div>
            <p class="error" *ngIf="loginError" >Usuario o contraseña incorrectos</p>

          <div class="d-grid mt-4 enlaces">
            <a class="enlace" routerLink="/register">Registrar usuario</a>     
            <a class="enlace" href="">Recuperar contraseña</a>       
          </div>
          <div class="d-grid mt-4">
            <button id="botonInicio" type="button" class="btn btn-primary" routerLink="/dashboard">
              Iniciar sesión
            </button>
          </div>

        </form>

      </div>
    </div>
  </div>

  
  <app-footer></app-footer>

</div>
