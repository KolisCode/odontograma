<div class="login-wrapper d-flex flex-column min-vh-100">
  <div class="login d-flex justify-content-center align-items-center flex-grow-1 py-4">
    <div class="card login-card shadow-sm border-0">
      <div class="card-body p-4 p-md-5">

        <div class="text-center mb-4">
          <img src="logos/muelaBiodont.png" alt="Logo de Biodont" class="logo mb-3">
          <h1 class="fw-bold mb-1" id="titulo">BIODONT</h1>
          <p class="text-muted mb-0">Accede al sistema odontológico</p>
        </div>

        <form novalidate>
          <div class="mb-3">
            <label for="inputEmail" class="form-label fw-semibold">Usuario</label>
            <div class="input-group">
              <span class="input-group-text">
                <i class="bi bi-person"></i>
              </span>
              <input
                type="email"
                class="form-control"
                id="inputEmail"
                placeholder="correo@ejemplo.com"
                autocomplete="username"
              >
            </div>
          </div>

          <div class="mb-2">
            <div class="d-flex justify-content-between align-items-center">
              <label for="inputPassword" class="form-label fw-semibold mb-0">Contraseña</label>
              <a class="small text-decoration-none enlace" href="">
                Recuperar contraseña
              </a>
            </div>

            <div class="input-group mt-2">
              <span class="input-group-text">
                <i class="bi bi-lock"></i>
              </span>
              <input
                type="password"
                class="form-control"
                id="inputPassword"
                placeholder="Ingresa tu contraseña"
                autocomplete="current-password"
              >
            </div>
          </div>

          <div *ngIf="loginError" class="alert alert-danger py-2 px-3 mt-3 mb-3" role="alert">
            Usuario o contraseña incorrectos.
          </div>

          <div class="d-grid mt-4">
            <button
              id="botonInicio"
              type="button"
              class="btn btn-primary btn-lg"
              routerLink="/dashboard">
              Iniciar sesión
            </button>
          </div>

          <div class="text-center mt-4 enlaces" id="registro">
            <a class="enlace ms-1 fw-semibold text-decoration-none"  routerLink="/register">
            Registrar usuario
            </a>
          </div>
        </form>

      </div>
    </div>
  </div>

  <app-footer></app-footer>
</div>
